<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE LOGIN</title>
    <link rel="stylesheet" href="style.css"><!--Inclusão do arquivo CSS para estilizar a página de login, garantindo uma aparência visual agradável e consistente com o design desejado-->
</head>

<body>
    <div class="conteiner"><!-- CONTAINER Pai, acopla todos os componetes da pagina de login -->
        <div class="conteiner_principal"><!--Conteiner filho para melhor visualização do conteude e estetica, comummente visto-->
            <h1>BEM VINDO</h1><!--Titulo de boas vindas em texto maior e mais distacado-->
            <p>Entre com sua conta para continuar</p><!--Texto de instrução para o usuario ao saber oque é necessario fazer sua tarefa fica mais objetiva-->
            <form id="loginForm" class="formulario"><!--Formulário de login, onde o usuario irá inserir suas credenciais para acessar a conta-->
                <label for="email">Email</label><!--Label para o campo de email, associada ao input de email para melhor acessibilidade e usabilidade-->
                <input type="email" name="email" id="email" placeholder="Digite seu email" required><!--Campo de entrada para o email do usuario, com validação de formato de email e placeholder para orientar o usuario-->
                <span class="erro" id="emailError"></span><!--Elemento para exibir mensagens de erro relacionadas ao campo de email, inicialmente vazio e estilizado para destacar erros caso ocorra-->
                <label for="password">Senha</label><!--Label para o campo de senha, associada ao input de senha para melhor acessibilidade e usabilidade-->
                <div class="password-container"><!--Container para o campo de senha e o botão de mostrar/ocultar senha, permitindo uma melhor organização visual e funcionalidade-->
                    <input type="password" name="password" id="password" placeholder="Digite sua senha" required><!--Campo de entrada para a senha do usuario, com tipo password para ocultar os caracteres digitados, placeholder para orientar o usuario e validação de campo obrigatório-->
                    <button type="button" class="btnImg" id="showPasswordBtn"><img
                            src="https://img.icons8.com/ios/50/FFFFFF/closed-eye.png" alt="closed-eye" /></button><!--Botão para mostrar ou ocultar a senha, com um ícone de olho fechado para indicar a função, posicionado ao lado do campo de senha para fácil acesso-->
                    <span class="erro" id="passwordError"></span><!--Elemento para exibir mensagens de erro relacionadas ao campo de senha, inicialmente vazio e estilizado para destacar erros caso ocorra-->
                </div>
                <div class="lembrete"><!--Container para a opção de lembrar a senha e o link de esqueci minha senha, organizando esses elementos relacionados para melhor usabilidade-->
                    <input type="checkbox" name="lembrete" id="lembrete"><!--Checkbox para a opção de lembrar a senha, permitindo que o usuario escolha se deseja que suas credenciais sejam lembradas para futuros acessos-->
                <label for="lembreme">Lembrar-me</label><!--Label para o checkbox de lembrar a senha, associada ao checkbox para melhor acessibilidade e usabilidade-->
                    <a id="esqueci" href="#" onclick="forgotPassword()">Esqueceu a senha?</a><!--Link para a funcionalidade de recuperação de senha, com um evento onclick para chamar a função de recuperação de senha, posicionado ao lado da opção de lembrar a senha para fácil acesso-->
                </div>
                <button type="submit">Entrar</button><!--Botão de submissão do formulário, com texto "Entrar" para indicar a ação de login, estilizado para se destacar e incentivar o usuario a clicar-->
            </form>
            <p>Não tem uma conta? <a href="#">Cadastre-se</a></p><!--Texto de incentivo para novos usuários se registrarem, com um link para a página de cadastro, posicionado abaixo do formulário de login para fácil acesso-->
        </div>
    </div>
    <script src="main.js"></script><!--Inclusão do arquivo JavaScript para adicionar interatividade e validação ao formulário de login, garantindo que as funcionalidades de mostrar/ocultar senha e validação de campos funcionem corretamente-->
</body>

</html>
